      tags: [Settlements]
      x-required-scopes: [platform:dead_letter:read]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: event_type
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated dead-letter list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/PaymentEvent"

  /pulse-api/v1/payments/dead-letter/{id}/resolve:
    post:
      operationId: resolveDeadLetterItem
      summary: Resolve or retry a dead-letter queue item
      tags: [Settlements]
      x-required-scopes: [platform:dead_letter:write]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [retry, discard, escalate]
