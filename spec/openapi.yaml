        "200":
          description: Dead-letter item resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  action_taken:
                    type: string
                  resolved_at:
                    type: string
                    format: date-time
