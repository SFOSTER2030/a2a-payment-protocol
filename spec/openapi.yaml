            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                capture_amount:
                  type: number
                  format: double
                  minimum: 0.01
                  description: Amount to capture. Defaults to the full authorized amount if omitted.
                settlement_note:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Payment captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentTransaction"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pulse-api/v1/settlements/batch:
    post:
      operationId: createBatchSettlement
      summary: Submit a batch of transactions for settlement in a single operation
      tags: [Settlements]
      x-required-scopes: [payments:settle]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchSettlement"
      responses:
        "202":
          description: Batch settlement accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchSettlement"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

