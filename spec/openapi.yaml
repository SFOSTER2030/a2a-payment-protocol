openapi: 3.1.0
info:
  title: Pulse AI — A2A Payment Protocol API
  version: "1.7.0"
  description: |
    Agent-to-Agent (A2A) Payment Protocol for the Pulse AI platform.
    Provides secure, auditable payment orchestration between autonomous agents
    with built-in escrow, authorization pipelines, and real-time reconciliation.
  contact:
    name: TFSF Ventures Support
    email: support@tfsfventures.com
  license:
    name: Proprietary
    url: https://github.com/SFOSTER2030/a2a-payment-protocol/blob/main/LICENSE

servers:
  - url: https://{your-instance}.pulse-internal/api
    description: "Internal API — not publicly accessible. Routes shown for architectural reference only."

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Agent or user JWT issued by the Pulse identity service.

  schemas:
    PaymentRequest:
      type: object
      required: [amount, currency, sender_agent_id, receiver_agent_id]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Payment amount in the specified currency.
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          example: USD
        sender_agent_id:
          type: string
          format: uuid
        receiver_agent_id:
          type: string
          format: uuid
        description:
          type: string
          maxLength: 500
        metadata:
          type: object
          additionalProperties: true
        idempotency_key:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
          readOnly: true

    PaymentTransaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        payment_request_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, authorized, settled, failed, reversed]
        amount:
          type: number
          format: double
        currency:
          type: string
        sender_agent_id:
          type: string
          format: uuid
        receiver_agent_id:
          type: string
          format: uuid
        authorization_id:
          type: string
          format: uuid
        settlement_reference:
          type: string
        settled_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaymentAuthorization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        transaction_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [approved, denied, pending_review]
        policy_checks:
          type: array
          items:
            type: object
            properties:
              check_name:
                type: string
              passed:
                type: boolean
              reason:
                type: string
        risk_score:
          type: number
          format: double
          minimum: 0
          maximum: 100
        authorized_by:
          type: string
        authorized_at:
          type: string
          format: date-time

    PaymentEscrow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        transaction_id:
          type: string
          format: uuid
        state:
          type: string
          enum: [held, released, refunded, disputed, frozen]
        amount:
          type: number
          format: double
        currency:
          type: string
        held_at:
          type: string
          format: date-time
        release_conditions:
          type: array
          items:
            type: object
            properties:
              condition_type:
                type: string
              status:
                type: string
                enum: [met, unmet, waived]
        expires_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time

    PaymentEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
          enum:
            - payment.requested
            - payment.authorized
            - payment.denied
            - payment.settled
            - payment.failed
            - escrow.held
            - escrow.released
            - escrow.disputed
        payload:
          type: object
          additionalProperties: true
        agent_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        sequence_number:
          type: integer
          format: int64

    SpendingPolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        name:
          type: string
        max_single_transaction:
          type: number
          format: double
        max_daily_spend:
          type: number
          format: double
        max_monthly_spend:
          type: number
          format: double
        allowed_receiver_agents:
          type: array
          items:
            type: string
            format: uuid
        blocked_categories:
          type: array
          items:
            type: string
        require_human_approval_above:
          type: number
          format: double
        active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentWallet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        balance:
          type: number
          format: double
        currency:
          type: string
        held_balance:
          type: number
          format: double
          description: Amount currently held in escrow.
        available_balance:
          type: number
          format: double
          readOnly: true
        daily_spent:
          type: number
          format: double
        monthly_spent:
          type: number
          format: double
        last_transaction_at:
          type: string
          format: date-time

    ReconciliationReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        total_transactions:
          type: integer
        total_settled:
          type: number
          format: double
        total_refunded:
          type: number
          format: double
        total_disputed:
          type: number
          format: double
        discrepancies:
          type: array
          items:
            type: object
            properties:
              transaction_id:
                type: string
                format: uuid
              expected_amount:
                type: number
                format: double
              actual_amount:
                type: number
                format: double
              reason:
                type: string
        status:
          type: string
          enum: [clean, discrepancies_found, pending_review]
        generated_at:
          type: string
          format: date-time

    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string
          writeOnly: true
        active:
          type: boolean
          default: true
        failure_count:
          type: integer
          default: 0
        last_triggered_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            request_id:
              type: string
              format: uuid

    DisputeRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        transaction_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, responded, escalated, arbitrated, resolved, timed_out]
        category:
          type: string
          enum: [unauthorized, service_not_rendered, quality_issue, duplicate, other]
        reason:
          type: string
        filed_by:
          type: string
          format: uuid
        filed_at:
          type: string
          format: date-time
        response_text:
          type: string
        responded_at:
          type: string
          format: date-time
        decision:
          type: string
          enum: [sender_wins, receiver_wins, split, pending]
        refund_amount:
          type: number
          format: double
        resolution_deadline:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
        evidence:
          $ref: "#/components/schemas/DisputeEvidence"

    DisputeEvidence:
      type: object
      properties:
        documents:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                format: uri
              description:
                type: string
              uploaded_at:
                type: string
                format: date-time
        notes:
          type: string
          maxLength: 5000

    ChargebackRequest:
      type: object
      required: [reason_code, amount]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        transaction_id:
          type: string
          format: uuid
        reason_code:
          type: string
          enum: [fraud, not_received, not_as_described, duplicate, other]
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        status:
          type: string
          enum: [initiated, under_review, accepted, rejected, reversed]
          readOnly: true
        description:
          type: string
          maxLength: 1000
        evidence:
          $ref: "#/components/schemas/DisputeEvidence"
        created_at:
          type: string
          format: date-time
          readOnly: true
        resolved_at:
          type: string
          format: date-time
          readOnly: true

    RefundRequest:
      type: object
      required: [amount]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        transaction_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        reason:
          type: string
          maxLength: 500
        partial:
          type: boolean
          default: false
        status:
          type: string
          enum: [pending, processed, failed]
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true

    Memo:
      type: object
      required: [subject, body]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        transaction_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        subject:
          type: string
          maxLength: 200
        body:
          type: string
          maxLength: 5000
        category:
          type: string
          enum: [adjustment, note, compliance, escalation]
        created_at:
          type: string
          format: date-time
          readOnly: true

    BatchSettlement:
      type: object
      required: [transaction_ids]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        transaction_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 500
        status:
          type: string
          enum: [pending, processing, completed, partially_failed]
          readOnly: true
        total_amount:
          type: number
          format: double
          readOnly: true
        currency:
          type: string
          readOnly: true
        succeeded_count:
          type: integer
          readOnly: true
        failed_count:
          type: integer
          readOnly: true
        submitted_at:
          type: string
          format: date-time
          readOnly: true
        completed_at:
          type: string
          format: date-time
          readOnly: true

    FeePolicy:
      type: object
      required: [name, fee_type, rate]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        fee_type:
          type: string
          enum: [percentage, flat, tiered]
        rate:
          type: number
          format: double
          minimum: 0
          description: Percentage rate (0-100) for percentage type, flat amount for flat type.
        flat_amount:
          type: number
          format: double
          minimum: 0
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        min_fee:
          type: number
          format: double
        max_fee:
          type: number
          format: double
        applies_to:
          type: string
          enum: [all_transactions, escrow_only, cross_agent, intra_agent]
        active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    Hold:
      type: object
      required: [agent_id, amount, currency, reason]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        agent_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        reason:
          type: string
          maxLength: 500
        status:
          type: string
          enum: [active, released, expired]
          readOnly: true
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          readOnly: true
        released_at:
          type: string
          format: date-time
          readOnly: true

    Statement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        opening_balance:
          type: number
          format: double
        closing_balance:
          type: number
          format: double
        total_debits:
          type: number
          format: double
        total_credits:
          type: number
          format: double
        transaction_count:
          type: integer
        currency:
          type: string
        generated_at:
          type: string
          format: date-time

    ComplianceExport:
      type: object
      required: [period_start, period_end, export_type]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        export_type:
          type: string
          enum: [transactions, disputes, chargebacks, full_audit]
        agent_ids:
          type: array
          items:
            type: string
            format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
          readOnly: true
        download_url:
          type: string
          format: uri
          readOnly: true
        requested_at:
          type: string
          format: date-time
          readOnly: true
        completed_at:
          type: string
          format: date-time
          readOnly: true

    AnalyticsResponse:
      type: object
      properties:
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        granularity:
          type: string
          enum: [hourly, daily, weekly, monthly]
        summary:
          type: object
          properties:
            total_transactions:
              type: integer
            total_volume:
              type: number
              format: double
            average_transaction_size:
              type: number
              format: double
            success_rate:
              type: number
              format: double
            dispute_rate:
              type: number
              format: double
            average_settlement_time_ms:
              type: integer
        time_series:
          type: array
          items:
            type: object
            properties:
              period:
                type: string
                format: date-time
              transaction_count:
                type: integer
              volume:
                type: number
                format: double
              success_count:
                type: integer
              failure_count:
                type: integer

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        pagination:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total_items:
              type: integer
            total_pages:
              type: integer
            has_next:
              type: boolean
            has_prev:
              type: boolean

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 100
    AgentIdParam:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

paths:
  # ───────────────────────────── Payment Routes (15) ─────────────────────────────

  /pulse-api/v1/payments/request:
    post:
      operationId: createPaymentRequest
      summary: Create a new payment request
      tags: [Payments]
      x-required-scopes: [payments:create]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        "201":
          description: Payment request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRequest"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pulse-api/v1/payments/request/{request_id}:
    get:
      operationId: getPaymentRequest
      summary: Retrieve a payment request by ID
      tags: [Payments]
      x-required-scopes: [payments:read]
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pulse-api/v1/payments/authorize:
    post:
      operationId: authorizePayment
      summary: Submit a payment for authorization pipeline
      tags: [Payments]
      x-required-scopes: [payments:authorize]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_request_id]
              properties:
                payment_request_id:
                  type: string
                  format: uuid
                override_policies:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Authorization result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentAuthorization"
        "403":
          description: Authorization denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentAuthorization"

  /pulse-api/v1/payments/authorize/{authorization_id}:
    get:
      operationId: getAuthorization
      summary: Retrieve authorization details
      tags: [Payments]
      x-required-scopes: [payments:read]
      parameters:
        - name: authorization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Authorization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentAuthorization"

  /pulse-api/v1/payments/settle:
    post:
      operationId: settlePayment
      summary: Execute settlement for an authorized payment
      tags: [Payments]
      x-required-scopes: [payments:settle]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [authorization_id]
              properties:
                authorization_id:
                  type: string
                  format: uuid
                settlement_note:
                  type: string
      responses:
        "200":
          description: Settlement executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentTransaction"

  /pulse-api/v1/payments/transactions:
    get:
      operationId: listTransactions
      summary: List payment transactions with filters
      tags: [Payments]
      x-required-scopes: [payments:read]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, authorized, settled, failed, reversed]
        - name: agent_id
          in: query
          schema:
            type: string
            format: uuid
        - name: from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated transaction list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/PaymentTransaction"

  /pulse-api/v1/payments/transactions/{transaction_id}:
    get:
      operationId: getTransaction
      summary: Retrieve a single transaction
      tags: [Payments]
      x-required-scopes: [payments:read]
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentTransaction"

  /pulse-api/v1/payments/reverse/{transaction_id}:
    post:
      operationId: reversePayment
      summary: Reverse a settled payment
      tags: [Payments]
      x-required-scopes: [payments:reverse]
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Reversal initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentTransaction"

  /pulse-api/v1/payments/escrow:
    post:
      operationId: createEscrow
      summary: Place funds in escrow for a transaction
      tags: [Payments]
      x-required-scopes: [payments:escrow]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transaction_id, release_conditions]
              properties:
                transaction_id:
                  type: string
                  format: uuid
                release_conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      condition_type:
                        type: string
                      parameters:
                        type: object
                expires_in_hours:
                  type: integer
                  default: 72
      responses:
        "201":
          description: Escrow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentEscrow"

  /pulse-api/v1/payments/escrow/{escrow_id}:
    get:
      operationId: getEscrow
      summary: Retrieve escrow status
      tags: [Payments]
      x-required-scopes: [payments:read]
      parameters:
        - name: escrow_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Escrow details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentEscrow"

  /pulse-api/v1/payments/escrow/{escrow_id}/release:
    post:
      operationId: releaseEscrow
      summary: Release funds from escrow to receiver
      tags: [Payments]
      x-required-scopes: [payments:escrow]
      parameters:
        - name: escrow_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Escrow released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentEscrow"

  /pulse-api/v1/payments/escrow/{escrow_id}/dispute:
    post:
      operationId: disputeEscrow
      summary: Raise a dispute on escrowed funds
      tags: [Payments]
      x-required-scopes: [payments:escrow]
      parameters:
