  # ───────────────────────────── Dispute Routes (5) ─────────────────────────────

  /pulse-api/v1/payments/{transaction_id}/dispute:
    post:
      operationId: fileDispute
      summary: File a dispute against a payment transaction
      tags: [Disputes]
      x-required-scopes: [disputes:create]
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason, evidence]
              properties:
                reason:
                  type: string
                  maxLength: 1000
                category:
                  type: string
                  enum: [unauthorized, service_not_rendered, quality_issue, duplicate, other]
                evidence:
                  $ref: "#/components/schemas/DisputeEvidence"
      responses:
        "201":
          description: Dispute filed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Dispute already exists for this transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getDispute
      summary: Retrieve dispute details for a transaction
      tags: [Disputes]
      x-required-scopes: [disputes:read]
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dispute details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeRecord"
        "404":
          description: No dispute found for this transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pulse-api/v1/payments/{transaction_id}/dispute/respond:
    post:
      operationId: respondToDispute
      summary: Submit a response to a dispute from the counterparty
      tags: [Disputes]
      x-required-scopes: [disputes:respond]
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [response_text]
              properties:
                response_text:
                  type: string
                  maxLength: 2000
                evidence:
                  $ref: "#/components/schemas/DisputeEvidence"
                accept_liability:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pulse-api/v1/payments/{transaction_id}/dispute/arbitrate:
    post:
      operationId: arbitrateDispute
      summary: Submit an arbitration decision on a dispute
      tags: [Disputes]
      x-required-scopes: [disputes:arbitrate]
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, rationale]
              properties:
                decision:
                  type: string
                  enum: [sender_wins, receiver_wins, split]
                rationale:
                  type: string
                  maxLength: 2000
                refund_amount:
                  type: number
                  format: double
                  minimum: 0
      responses:
        "200":
          description: Arbitration decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pulse-api/v1/disputes:
    get:
      operationId: listDisputes
      summary: List all disputes with filters
      tags: [Disputes]
      x-required-scopes: [disputes:read]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [open, responded, escalated, arbitrated, resolved, timed_out]
        - name: agent_id
          in: query
          schema:
            type: string
            format: uuid
        - name: from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated dispute list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DisputeRecord"

