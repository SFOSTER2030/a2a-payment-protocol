  # ───────────────────────────── Settlement Operations Routes (6) ─────────────────────────────

  /pulse-api/v1/payments/{transaction_id}/capture:
    post:
      operationId: capturePayment
      summary: Capture a pre-authorized payment for settlement
      tags: [Settlements]
      x-required-scopes: [payments:capture]
      parameters:
        - name: transaction_id
          in: path
          required: true
